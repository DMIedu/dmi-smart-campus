<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DMI Smart Campus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 20% 20%, rgba(30, 58, 138, 0.06) 0%, transparent 50%),
        var(--bg);
    }
    
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px -20px rgba(15, 23, 42, 0.15);
    }
    
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-mark {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--dmi-primary), var(--dmi-primary-dark));
      border-radius: 14px;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    
    .login-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    
    .login-role {
      color: var(--text-muted);
      font-size: 0.9375rem;
      margin-top: 0.25rem;
    }
    
    .role-switcher {
      display: flex;
      gap: 0.25rem;
      background: var(--bg);
      padding: 0.25rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
    }
    
    .role-switcher button {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    
    .role-switcher button.active {
      background: var(--surface);
      color: var(--dmi-primary);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    
    .field { margin-bottom: 1rem; }
    
    .hint {
      background: #fef3c7;
      border: 1px solid #fde68a;
      color: #78350f;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8125rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    
    .hint code {
      background: rgba(0,0,0,0.08);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
    }
    
    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
    }
    
    .back-link a {
      color: var(--text-muted);
      text-decoration: none;
    }
    
    .back-link a:hover { color: var(--dmi-primary); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card fade-in">
      <div class="login-brand">
        <div class="login-mark">D</div>
        <div class="login-title">DMI Smart Campus</div>
        <div class="login-role" id="role-label">Reception / Admin Login</div>
      </div>
      
      <div class="role-switcher">
        <button data-role="reception" class="active">🏢 Reception</button>
        <button data-role="teacher">👨‍🏫 Teacher</button>
        <button data-role="student">🎓 Student</button>
      </div>
      
      <div class="hint" id="hint">
        <strong>Default admin:</strong> <code>admin</code> / <code>admin123</code><br>
        <strong>Reception:</strong> <code>reception_jfn</code> / <code>dmi2026</code>
      </div>
      
      <div class="error-msg" id="error-msg"></div>
      
      <form id="login-form">
        <div class="field">
          <label class="label">Username</label>
          <input type="text" class="input" id="username" required autocomplete="username" autofocus>
        </div>
        
        <div class="field">
          <label class="label">Password</label>
          <input type="password" class="input" id="password" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; padding: 0.875rem;">
          Sign in
        </button>
      </form>
      
      <div class="back-link">
        <a href="index.html">← Choose different role</a>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script>
    let currentRole = new URLSearchParams(window.location.search).get('role') || 'reception';
    
    const roleLabels = {
      reception: 'Reception / Admin Login',
      teacher: 'Teacher Login',
      student: 'Student Login'
    };
    
    const roleHints = {
      reception: '<strong>Default admin:</strong> <code>admin</code> / <code>admin123</code><br><strong>Reception:</strong> <code>reception_jfn</code> / <code>dmi2026</code>',
      teacher: 'Use your assigned teacher username and password.',
      student: 'Username = your registration number. Default password = last 6 digits of phone number.'
    };
    
    function setRole(role) {
      currentRole = role;
      document.getElementById('role-label').textContent = roleLabels[role];
      document.getElementById('hint').innerHTML = roleHints[role];
      document.querySelectorAll('.role-switcher button').forEach(b => {
        b.classList.toggle('active', b.dataset.role === role);
      });
    }
    
    document.querySelectorAll('.role-switcher button').forEach(b => {
      b.addEventListener('click', () => setRole(b.dataset.role));
    });
    
    setRole(currentRole);
    
    // ===== LOGIN HANDLER =====
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');
      
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';
      btn.style.cssText = 'width:100%;padding:.875rem;display:flex;align-items:center;justify-content:center;';
      
      // Choose action based on role
      const action = {
        reception: 'login',
        teacher: 'teacherLogin',
        student: 'studentLogin'
      }[currentRole];
      
      const result = await apiCall(action, { username, password });
      
      btn.disabled = false;
      btn.textContent = 'Sign in';
      
      if (result && result.success) {
        setSession(result.token, result.user);
        
        const target = {
          admin: 'reception-dashboard.html',
          reception: 'reception-dashboard.html',
          teacher: 'teacher-dashboard.html',
          student: 'student-dashboard.html'
        }[result.user.role];
        
        window.location.href = target || 'reception-dashboard.html';
      } else {
        errEl.textContent = (result && result.error) || 'Login failed';
        errEl.style.display = 'block';
      }
    });
  </script>
  
  <style>
    /* Spinner shim since we're not using Tailwind */
    .w-5 { width: 1.25rem; }
    .h-5 { height: 1.25rem; }
    .border-2 { border-width: 2px; }
    .border-white { border-color: white; }
    .border-t-transparent { border-top-color: transparent; }
    .rounded-full { border-radius: 9999px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 0.8s linear infinite; }
  </style>
</body>
</html>
