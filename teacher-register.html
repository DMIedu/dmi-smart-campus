<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Teacher — DMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .container { max-width: 640px; margin: 0 auto; padding: 1.5rem; }
    .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .back-link:hover { color: var(--dmi-primary); }
    .page-title { font-family: var(--font-display); font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .page-subtitle { color: var(--text-muted); font-size: 0.9375rem; margin-bottom: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid-full { grid-column: 1 / -1; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; margin-bottom: 1rem; }
    .required { color: var(--dmi-danger); }
    .field-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
    .submit-bar { display: flex; gap: 0.75rem; justify-content: flex-end; padding-top: 1.5rem; border-top: 1px solid var(--border); margin-top: 1rem; }
    @media (max-width: 600px) { .submit-bar { flex-direction: column-reverse; } .submit-bar .btn { width: 100%; } }
    
    .success-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
    .success-overlay.active { display: flex; }
    .success-card { background: var(--surface); border-radius: 20px; padding: 2.5rem 2rem 2rem; max-width: 480px; width: 100%; box-shadow: 0 25px 60px -15px rgba(0,0,0,0.3); animation: pop-in 300ms cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes pop-in { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon { width: 64px; height: 64px; background: #d1fae5; color: #065f46; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1rem; }
    .success-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 0.25rem; }
    .success-subtitle { color: var(--text-muted); text-align: center; font-size: 0.9375rem; margin-bottom: 1.5rem; }
    .creds-box { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .creds-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px dashed var(--border); }
    .creds-row:last-child { border-bottom: none; }
    .creds-label { font-size: 0.8125rem; color: var(--text-muted); font-weight: 600; }
    .creds-value { font-family: var(--font-mono); font-size: 0.9375rem; font-weight: 600; background: var(--surface); padding: 0.25rem 0.625rem; border-radius: 6px; border: 1px solid var(--border); }
    .success-actions { display: flex; gap: 0.75rem; }
    .success-actions .btn { flex: 1; }
  </style>
</head>
<body>
  <header class="dmi-header">
    <div class="dmi-logo">
      <div class="dmi-logo-mark">D</div>
      <span>DMI Smart Campus</span>
    </div>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </header>
  
  <div class="container">
    <a href="reception-dashboard.html" class="back-link fade-in">← Back to dashboard</a>
    <h1 class="page-title fade-in">Register Teacher</h1>
    <p class="page-subtitle fade-in">Add a teacher to the system. They'll get a login + QR card.</p>
    
    <form id="teacher-form" class="card fade-in" style="animation-delay: 100ms">
      <div class="form-grid">
        <div class="field form-grid-full">
          <label class="label">Full Name <span class="required">*</span></label>
          <input type="text" class="input" name="TeacherName" required autofocus>
        </div>
        
        <div class="field">
          <label class="label">Phone Number <span class="required">*</span></label>
          <input type="tel" class="input" name="PhoneNumber" required placeholder="0771234567">
          <span class="field-hint">Default password = last 6 digits</span>
        </div>
        
        <div class="field">
          <label class="label">Email</label>
          <input type="email" class="input" name="Email" placeholder="teacher@example.com">
        </div>
        
        <div class="field">
          <label class="label">Subject <span class="required">*</span></label>
          <input type="text" class="input" name="Subject" required placeholder="e.g. Spoken English, IT">
        </div>
        
        <div class="field">
          <label class="label">Branch <span class="required">*</span></label>
          <select class="select" name="AssignedBranch" id="branch-select" required>
            <option value="">Loading...</option>
          </select>
        </div>
        
        <div class="field">
          <label class="label">Custom Username</label>
          <input type="text" class="input" name="Username" placeholder="Optional - auto-generated if blank">
          <span class="field-hint">Used for login</span>
        </div>
        
        <div class="field">
          <label class="label">Custom Password</label>
          <input type="text" class="input" name="Password" placeholder="Optional - phone digits if blank">
        </div>
      </div>
      
      <div class="submit-bar">
        <button type="button" class="btn btn-ghost" onclick="window.location.href='reception-dashboard.html'">Cancel</button>
        <button type="submit" class="btn btn-primary" id="submit-btn">Register Teacher</button>
      </div>
    </form>
  </div>
  
  <!-- Success Modal -->
  <div class="success-overlay" id="success-overlay">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <div class="success-title">Teacher Registered!</div>
      <div class="success-subtitle" id="success-name">—</div>
      
      <div class="creds-box">
        <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:var(--text-muted);margin-bottom:0.75rem;">Login Credentials</div>
        <div class="creds-row">
          <span class="creds-label">Username</span>
          <span class="creds-value" id="cred-user">—</span>
        </div>
        <div class="creds-row">
          <span class="creds-label">Password</span>
          <span class="creds-value" id="cred-pass">—</span>
        </div>
        <div class="creds-row">
          <span class="creds-label">QR Code ID</span>
          <span class="creds-value" id="cred-qr">—</span>
        </div>
      </div>
      
      <div class="success-actions">
        <button class="btn btn-ghost" onclick="addAnother()">Add Another</button>
        <button class="btn btn-primary" onclick="window.location.href='reception-dashboard.html'">Done</button>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(['admin', 'reception']);
    if (!user) throw 'redirect';
    
    async function loadBranches() {
      const result = await apiCall('listBranches');
      const select = document.getElementById('branch-select');
      
      if (!result || !result.success) {
        select.innerHTML = '<option value="">Failed to load</option>';
        return;
      }
      
      let options = '<option value="">Select branch...</option>';
      result.branches.forEach(b => {
        const selected = String(b.BranchID) === String(user.branchId) ? 'selected' : '';
        options += `<option value="${b.BranchID}" ${selected}>${b.BranchName}</option>`;
      });
      select.innerHTML = options;
      
      if (user.role === 'reception') {
        select.disabled = true;
      }
    }
    
    loadBranches();
    
    document.getElementById('teacher-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Registering...';
      
      const formData = new FormData(e.target);
      const params = {};
      for (const [key, value] of formData.entries()) {
        if (value) params[key] = value;
      }
      
      if (user.role === 'reception' && !params.AssignedBranch) {
        params.AssignedBranch = user.branchId;
      }
      
      const result = await apiCall('createTeacher', params);
      
      btn.disabled = false;
      btn.textContent = 'Register Teacher';
      
      if (result && result.success) {
        document.getElementById('success-name').textContent = result.teacher.TeacherName;
        document.getElementById('cred-user').textContent = result.loginCredentials.username;
        document.getElementById('cred-pass').textContent = result.loginCredentials.defaultPassword;
        document.getElementById('cred-qr').textContent = result.teacher.QRCodeID;
        document.getElementById('success-overlay').classList.add('active');
      } else {
        showToast(result?.error || 'Failed to register teacher', 'error');
      }
    });
    
    function addAnother() {
      document.getElementById('success-overlay').classList.remove('active');
      document.getElementById('teacher-form').reset();
      if (user.role === 'reception') {
        document.getElementById('branch-select').value = user.branchId;
      }
      document.querySelector('input[name="TeacherName"]').focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
