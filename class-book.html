<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Book — DMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .container {
      max-width: 100%;
      padding: 1.5rem;
    }
    
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--dmi-primary); }
    
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .page-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    
    .page-subtitle {
      color: var(--text-muted);
      font-size: 0.9375rem;
    }
    
    /* Class selector */
    .selector-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .selector-row {
      display: flex;
      gap: 1rem;
      align-items: end;
      flex-wrap: wrap;
    }
    
    .selector-field {
      flex: 1;
      min-width: 240px;
    }
    
    /* Class info header */
    .class-info-card {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e2a5e 100%);
      color: white;
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .class-info-card::after {
      content: '';
      position: absolute;
      right: -50px;
      top: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    
    .class-info-batch {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      position: relative;
      z-index: 1;
    }
    
    .class-info-course {
      opacity: 0.85;
      font-size: 0.9375rem;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }
    
    .class-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.15);
      position: relative;
      z-index: 1;
    }
    
    .info-stat-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
      margin-bottom: 0.25rem;
    }
    
    .info-stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
    }
    
    .progress-bar {
      margin-top: 0.5rem;
      background: rgba(255,255,255,0.15);
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
    }
    
    .progress-fill {
      background: #fbbf24;
      height: 100%;
      transition: width 600ms ease-out;
    }
    
    /* Action bar */
    .action-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    /* Attendance table */
    .book-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .book-scroll {
      overflow-x: auto;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .book-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
      min-width: 800px;
    }
    
    .book-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
    }
    
    .book-table th {
      padding: 0.75rem 0.5rem;
      text-align: center;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: var(--surface);
    }
    
    .book-table th.fixed-col {
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 11;
      text-align: left;
      box-shadow: 2px 0 5px rgba(0,0,0,0.04);
    }
    
    .book-table th.fixed-col.col-name { left: 70px; min-width: 180px; }
    .book-table th.fixed-col.col-reg { width: 70px; }
    .book-table th.fixed-col.col-phone { left: 250px; }
    
    .book-table td {
      padding: 0.625rem 0.5rem;
      border-bottom: 1px solid #f1f5f9;
      text-align: center;
      white-space: nowrap;
    }
    
    .book-table td.fixed-col {
      position: sticky;
      background: var(--surface);
      text-align: left;
      z-index: 5;
      box-shadow: 2px 0 5px rgba(0,0,0,0.04);
    }
    
    .book-table td.col-reg { left: 0; width: 70px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
    .book-table td.col-name { left: 70px; min-width: 180px; font-weight: 600; }
    .book-table td.col-phone { left: 250px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
    
    .book-table tbody tr:hover td { background: #f8fafc; }
    
    /* Daily totals footer row */
    .book-table tfoot {
      position: sticky;
      bottom: 0;
      z-index: 8;
    }
    
    .book-table tfoot tr.totals-row td {
      background: #f1f5f9;
      border-top: 2px solid #1e3a8a;
      border-bottom: none;
      font-weight: 700;
      padding: 0.75rem 0.5rem;
    }
    
    .book-table tfoot tr.totals-row td.fixed-col {
      background: #f1f5f9;
      font-family: var(--font-display);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1e3a8a;
    }
    
    .day-total {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 1px;
      padding: 0.25rem 0.375rem;
      border-radius: 6px;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.9375rem;
      min-width: 32px;
    }
    
    .day-total-sub {
      font-size: 0.625rem;
      font-weight: 600;
      opacity: 0.7;
    }
    
    .day-total-good { background: #d1fae5; color: #065f46; }
    .day-total-warn { background: #fef3c7; color: #92400e; }
    .day-total-bad { background: #fee2e2; color: #991b1b; }
    
    /* Attendance cells */
    .att-cell {
      width: 40px;
      height: 36px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 150ms;
      user-select: none;
    }
    
    .att-present { background: #d1fae5; color: #065f46; }
    .att-present:hover { background: #a7f3d0; }
    
    .att-absent { background: #fee2e2; color: #991b1b; }
    .att-absent:hover { background: #fecaca; }
    
    .att-none { background: #f1f5f9; color: #cbd5e1; }
    .att-none:hover { background: #e2e8f0; }
    
    /* Date column header */
    .date-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .date-day { font-size: 0.625rem; opacity: 0.7; }
    .date-num { font-size: 0.875rem; font-weight: 800; color: var(--text); }
    
    /* Total columns */
    .total-cell {
      font-weight: 700;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
    }
    
    .percent-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .percent-good { background: #d1fae5; color: #065f46; }
    .percent-warn { background: #fef3c7; color: #92400e; }
    .percent-bad { background: #fee2e2; color: #991b1b; }
    
    /* Fee status */
    .fee-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .fee-paid { background: #d1fae5; color: #065f46; }
    .fee-pending { background: #fef3c7; color: #92400e; }
    .fee-overdue { background: #fee2e2; color: #991b1b; }
    
    /* Empty states */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .empty-text {
      font-size: 0.9375rem;
      max-width: 360px;
      margin: 0 auto 1.5rem;
      line-height: 1.5;
    }
    
    /* Add Students Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    
    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 60px -15px rgba(0,0,0,0.3);
      animation: pop-in 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes pop-in {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .modal-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }
    
    .modal-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .modal-search {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1.5rem;
    }
    
    .student-pick-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 150ms;
    }
    .student-pick-row:hover { background: var(--bg); }
    
    .pick-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms;
      flex-shrink: 0;
    }
    
    .student-pick-row.checked .pick-checkbox {
      background: var(--dmi-primary);
      border-color: var(--dmi-primary);
      color: white;
    }
    .student-pick-row.checked .pick-checkbox::after {
      content: '✓';
      font-size: 0.875rem;
      font-weight: 700;
    }
    
    .student-pick-row.already-in {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pick-info { flex: 1; min-width: 0; }
    .pick-name { font-weight: 600; font-size: 0.9375rem; }
    .pick-meta { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono); }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }
    
    .selection-count {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .class-info-card { padding: 1.25rem; }
      .class-info-batch { font-size: 1.25rem; }
    }
    
    @media print {
      .dmi-header, .back-link, .action-bar, .selector-card { display: none !important; }
      .container { padding: 0; }
      .class-info-card { 
        background: white !important; 
        color: black !important; 
        border: 1px solid #ccc;
      }
      .class-info-card::after { display: none; }
      .book-scroll { max-height: none; overflow: visible; }
      .book-table { font-size: 0.75rem; }
      .att-cell { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <header class="dmi-header">
    <div class="dmi-logo">
      <div class="dmi-logo-mark">D</div>
      <span>DMI Smart Campus</span>
    </div>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </header>
  
  <div class="container">
    <a href="reception-dashboard.html" class="back-link">← Back to dashboard</a>
    
    <div class="page-header fade-in">
      <div>
        <h1 class="page-title">Digital Class Book</h1>
        <p class="page-subtitle">View and manage attendance for any class.</p>
      </div>
    </div>
    
    <!-- Class Selector -->
    <div class="selector-card fade-in">
      <div class="selector-row">
        <div class="selector-field">
          <label class="label">Select Class</label>
          <select class="select" id="class-select" onchange="loadClassBook()">
            <option value="">Loading classes...</option>
          </select>
        </div>
        <button class="btn btn-ghost" onclick="loadClasses()" title="Refresh">
          🔄 Refresh
        </button>
        <button class="btn btn-ghost" id="edit-class-btn" onclick="openEditClass()" title="Edit class schedule" style="display:none">
          ✏️ Edit Class
        </button>
        <button class="btn btn-ghost" id="message-batch-btn" onclick="openMessageBatch()" title="Message all students" style="display:none">
          📣 Message Batch
        </button>
      </div>
    </div>
    
    <!-- Main content area -->
    <div id="main-content"></div>
  </div>
  
  <!-- Add Students Modal -->
  <div class="modal-overlay" id="add-students-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Add Students to Batch</div>
        <div class="modal-subtitle" id="modal-batch-name">—</div>
      </div>
      
      <div class="modal-search">
        <input type="text" class="input" id="student-search" placeholder="🔍 Search by name or registration number..." oninput="filterStudents()">
      </div>
      
      <div class="modal-body" id="students-pick-list">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>Loading students...</div>
        </div>
      </div>
      
      <div class="modal-footer">
        <div class="selection-count" id="selection-count">0 selected</div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-ghost" onclick="closeAddStudents()">Cancel</button>
          <button class="btn btn-primary" id="add-selected-btn" onclick="addSelectedStudents()">Add Selected</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Mark Attendance Modal -->
  <div class="modal-overlay" id="mark-modal">
    <div class="modal-card" style="max-width: 420px;">
      <div class="modal-header">
        <div class="modal-title" id="mark-student-name">Mark Attendance</div>
        <div class="modal-subtitle" id="mark-date">—</div>
      </div>
      
      <div style="padding: 1.5rem;">
        <div style="display: flex; gap: 0.75rem;">
          <button class="btn btn-primary" style="flex:1;background:#059669" onclick="setAttendance('Present')">
            ✓ Present
          </button>
          <button class="btn btn-primary" style="flex:1;background:#dc2626" onclick="setAttendance('Absent')">
            ✕ Absent
          </button>
        </div>
        <button class="btn btn-ghost" style="width:100%;margin-top:0.75rem" onclick="closeMarkModal()">Cancel</button>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(['admin', 'reception', 'teacher']);
    if (!user) throw 'redirect';
    
    let currentClass = null;
    let currentBook = null;
    let allStudents = [];
    let batchStudentIds = new Set();
    let selectedToAdd = new Set();
    let pendingMark = null;
    
    // Load list of classes for dropdown
    async function loadClasses() {
      const result = await apiCall('listGroupClasses', { status: 'Active' });
      const select = document.getElementById('class-select');
      
      if (!result || !result.success) {
        select.innerHTML = '<option value="">Failed to load classes</option>';
        return;
      }
      
      if (result.classes.length === 0) {
        select.innerHTML = '<option value="">No classes yet — create one first</option>';
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state card">
            <div class="empty-icon">📚</div>
            <div class="empty-title">No classes yet</div>
            <div class="empty-text">Create a group class first to start building your attendance book.</div>
            <a href="group-class-create.html" class="btn btn-primary">+ Create Class</a>
          </div>
        `;
        return;
      }
      
      let options = '<option value="">Select a class...</option>';
      // Group by branch, then course (backend already sorts branch→course→name)
      let currentBranch = null, currentCourse = null;
      result.classes.forEach(c => {
        const branchName = c.BranchName || 'Other';
        if (branchName !== currentBranch) {
          if (currentBranch !== null) options += '</optgroup>';
          options += `<optgroup label="🏢 ${escape(branchName)}">`;
          currentBranch = branchName;
          currentCourse = null;
        }
        const courseTag = c.Course && c.Course !== currentCourse ? `[${escape(c.Course)}] ` : '';
        currentCourse = c.Course;
        options += `<option value="${c.GroupClassID}">${courseTag}${escape(c.BatchName)} (${escape(c.TeacherName)})</option>`;
      });
      if (currentBranch !== null) options += '</optgroup>';
      select.innerHTML = options;
      
      // Auto-select if there's a class ID in URL
      const urlParams = new URLSearchParams(window.location.search);
      const classId = urlParams.get('class');
      if (classId) {
        select.value = classId;
        loadClassBook();
      }
    }
    
    // Load the class book matrix
    async function loadClassBook() {
      const selectEl = document.getElementById('class-select');
      // Read value from the selected option directly (most reliable)
      const classId = selectEl.options[selectEl.selectedIndex] 
        ? selectEl.options[selectEl.selectedIndex].value 
        : selectEl.value;
      const mainContent = document.getElementById('main-content');
      
      if (!classId || classId.trim() === '') {
        mainContent.innerHTML = '';
        return;
      }
      
      mainContent.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>Loading class book...</div></div>';
      
      const result = await apiCall('getClassBook', { GroupClassID: classId.trim() });
      
      if (!result || !result.success) {
        mainContent.innerHTML = `
          <div class="empty-state card">
            <div class="empty-icon">⚠</div>
            <div class="empty-title">Could not load class book</div>
            <div class="empty-text">${result?.error || 'Unknown error'}</div>
          </div>
        `;
        return;
      }
      
      currentClass = result.classInfo;
      currentBook = result;
      batchStudentIds = new Set(result.students.map(s => s.StudentID));
      
      document.getElementById('edit-class-btn').style.display = 'inline-flex';
      document.getElementById('message-batch-btn').style.display = 'inline-flex';
      
      renderClassBook();
    }
    
    function renderClassBook() {
      const info = currentClass;
      const summary = currentBook.summary;
      const students = currentBook.students;
      const dates = currentBook.classDates;
      
      let html = `
        <!-- Class info header -->
        <div class="class-info-card fade-in">
          <div class="class-info-batch">${escape(info.BatchName)}</div>
          <div class="class-info-course">${escape(info.Course)} · ${escape(info.BranchName)} · ${escape(info.TeacherName)}</div>
          <div class="class-info-grid">
            <div>
              <div class="info-stat-label">Days</div>
              <div class="info-stat-value">${escape(info.Days || '—').replace(/,/g, ' · ')}</div>
            </div>
            <div>
              <div class="info-stat-label">Time</div>
              <div class="info-stat-value">${formatClassTime(info)}</div>
            </div>
            <div>
              <div class="info-stat-label">Students</div>
              <div class="info-stat-value">${students.length}</div>
            </div>
            <div>
              <div class="info-stat-label">Classes Conducted</div>
              <div class="info-stat-value">${summary.ClassesConducted} / ${info.ExpectedClasses}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${summary.ProgressPercent}%"></div></div>
            </div>
            <div>
              <div class="info-stat-label">Hours Done</div>
              <div class="info-stat-value">${summary.HoursCompleted} / ${info.TotalCourseHours}h</div>
            </div>
            <div>
              <div class="info-stat-label">Units</div>
              <div class="info-stat-value">${summary.UnitsCompleted} / ${info.NumberOfUnits}</div>
            </div>
          </div>
        </div>
        
        <!-- Action bar -->
        <div class="action-bar">
          <button class="btn btn-primary" onclick="openAddStudents()">+ Add Students</button>
          <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
          <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
          <button class="btn btn-ghost" onclick="loadClassBook()">🔄 Refresh</button>
        </div>
      `;
      
      if (students.length === 0) {
        html += `
          <div class="empty-state card">
            <div class="empty-icon">👥</div>
            <div class="empty-title">No students in this batch yet</div>

    function escape(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    
    // Cleans up messy date-as-time strings into HH:MM – HH:MM
    function formatClassTime(info) {
      if (!info) return '—';
      
      // Try the Time field first (combined string)
      if (info.Time && typeof info.Time === 'string' && info.Time.indexOf('GMT') === -1 && info.Time.length < 20) {
        return info.Time;
      }
      
      // Build from StartTime + EndTime
      const start = cleanTime(info.StartTime);
      const end = cleanTime(info.EndTime);
      if (start && end) return start + ' – ' + end;
      if (start) return start;
      
      // Try extracting from messy Time string
      if (info.Time) {
        const matches = String(info.Time).match(/(\d{1,2}):(\d{2})/g);
        if (matches && matches.length >= 2) return matches[0] + ' – ' + matches[1];
        if (matches && matches.length === 1) return matches[0];
      }
      
      return '—';
    }
    
    function cleanTime(t) {
      if (!t) return '';
      // If it's a Date object string with GMT
      if (typeof t === 'object' || (typeof t === 'string' && t.indexOf('GMT') !== -1)) {
        try {
          const d = new Date(t);
          if (!isNaN(d.getTime())) {
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return hh + ':' + mm;
          }
        } catch (e) {}
      }
      // If it's already HH:MM:SS or HH:MM
      const s = String(t);
      const match = s.match(/(\d{1,2}):(\d{2})/);
      if (match) return match[0];
      return s;
    }

    function extractTimeValue(t, idx) {
      if (!t) return '';
      const matches = String(t).match(/(\d{1,2}):(\d{2})/g);
      if (!matches) return '';
      if (idx === undefined) return convertTo24(matches[0]);
      return matches[idx] ? convertTo24(matches[idx]) : '';
    }
    
    function convertTo24(t) {
      // Handle "1:30" style (afternoon) — heuristic: hours 1-7 are PM for a lab/class
      const m = String(t).match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return t;
      let h = parseInt(m[1]);
      const min = m[2];
      // If already looks like 24h (08, 09, 10...), keep. If 1-7, assume PM.
      if (h >= 1 && h <= 7) h += 12;
      return String(h).padStart(2,'0') + ':' + min;
    }

      const t = MSG_TEMPLATES[key];
      const batchName = currentClass.BatchName;
      document.getElementById('mb-subject').value = (t.subject || '').replace(/{batch}/g, batchName);
      document.getElementById('mb-body').value = (t.body || '').replace(/{batch}/g, batchName);
    }
    
    function closeMessageBatch() {
      const m = document.getElementById('message-batch-overlay');
      if (m) m.style.display = 'none';
    }
    
    async function sendBatchEmail() {
      const subject = document.getElementById('mb-subject').value.trim();
      const body = document.getElementById('mb-body').value.trim();
      const status = document.getElementById('mb-status');
      
      if (!subject || !body) {
        status.style.display = 'block';
        status.style.background = '#fee2e2'; status.style.color = '#991b1b';
        status.textContent = 'Please enter both subject and message';
        return;
      }
      
      if (!batchContacts || batchContacts.withEmail === 0) {
        status.style.display = 'block';
        status.style.background = '#fee2e2'; status.style.color = '#991b1b';
        status.textContent = 'No students in this batch have email addresses';
        return;
      }
      
      if (!confirm(`Send this email to ${batchContacts.withEmail} students?`)) return;
      
      const btn = document.getElementById('mb-email-btn');
      btn.disabled = true; btn.textContent = 'Sending...';
      
      const r = await apiCall('emailBatch', {
        GroupClassID: currentClass.GroupClassID,
        subject: subject, body: body
      });
      
      btn.disabled = false; btn.textContent = '📧 Send Email';
      status.style.display = 'block';
      
      if (r && r.success) {
        status.style.background = '#d1fae5'; status.style.color = '#065f46';
        status.textContent = `✓ ${r.message}`;
        showToast(r.message, 'success');
      } else {
        status.style.background = '#fee2e2'; status.style.color = '#991b1b';
        status.textContent = '⚠ ' + (r?.error || 'Failed to send');
      }
    }
    
    function openWhatsAppList() {
      if (!batchContacts || batchContacts.withPhone === 0) {
        showToast('No students have phone numbers', 'warning');
        return;
      }
      
      const body = document.getElementById('mb-body').value.trim();
      if (!body) { showToast('Type a message first', 'warning'); return; }
      
      const withPhone = batchContacts.contacts.filter(c => c.hasPhone);
      const msg = encodeURIComponent(body);
      
      let modal = document.getElementById('whatsapp-list-overlay');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'whatsapp-list-overlay';
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);z-index:1100;display:flex;align-items:center;justify-content:center;padding:1rem;';
        document.body.appendChild(modal);
      }
      
      const rows = withPhone.map((c, i) => {
        let phone = String(c.phone).replace(/\D/g, '');
        if (phone.startsWith('0')) phone = '94' + phone.substring(1);
        else if (!phone.startsWith('94')) phone = '94' + phone;
        return `
          <a href="https://wa.me/${phone}?text=${msg}" target="_blank" rel="noopener" 
             style="display:flex;align-items:center;gap:0.75rem;padding:0.625rem 0.75rem;border-radius:8px;text-decoration:none;color:inherit;border-bottom:1px solid #f1f5f9;"
             onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'"
             onclick="markWaSent(${i})">
            <div style="width:32px;height:32px;border-radius:50%;background:#25d366;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.875rem;">${escape((c.name||'?').charAt(0).toUpperCase())}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:600;font-size:0.875rem;">${escape(c.name)}</div>
              <div style="font-size:0.75rem;color:#64748b;font-family:monospace;">${escape(c.phone)}</div>
            </div>
            <span id="wa-status-${i}" style="font-size:1.125rem;color:#25d366;">💬</span>
          </a>`;
      }).join('');
      
      modal.innerHTML = `
        <div style="background:white;border-radius:16px;max-width:440px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 25px 60px rgba(0,0,0,0.3);">
          <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div style="font-family:'Plus Jakarta Sans';font-weight:800;font-size:1.125rem;">💬 WhatsApp Students</div>
              <div style="font-size:0.8125rem;color:#64748b;margin-top:2px;">Tap each student to send via WhatsApp (${withPhone.length} students)</div>
            </div>
            <button onclick="document.getElementById('whatsapp-list-overlay').style.display='none'" style="background:none;border:none;font-size:1.5rem;color:#94a3b8;cursor:pointer;">×</button>
          </div>
          <div style="overflow-y:auto;padding:0.5rem 1rem;">${rows}</div>
          <div style="padding:1rem 1.5rem;border-top:1px solid #e2e8f0;font-size:0.75rem;color:#94a3b8;">
            💡 Each tap opens WhatsApp with your message pre-filled. Sent students turn green ✓
          </div>
        </div>
      `;
      modal.style.display = 'flex';
    }
    
    function markWaSent(i) {
      const el = document.getElementById('wa-status-' + i);
      if (el) { el.textContent = '✓'; el.style.color = '#059669'; }
    }
    
    // ===== STUDENT COMMENT + STATUS (dropout / batch change) =====
    function openStudentNote(studentId, studentName) {
      const s = (currentBook?.students || []).find(x => String(x.StudentID) === String(studentId));
      const existingNote = s?.Remarks || '';
      const existingStatus = s?.BatchStatus || 'Active';
      
      let modal = document.getElementById('student-note-overlay');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'student-note-overlay';
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;';
        document.body.appendChild(modal);
      }
      
      modal.innerHTML = `
        <div style="background:white;border-radius:16px;max-width:440px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,0.3);">
          <div style="padding:1.25rem 1.5rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;">
            <div>
              <div style="font-family:'Plus Jakarta Sans';font-weight:800;font-size:1.125rem;">💬 Student Note</div>
              <div style="font-size:0.8125rem;color:#64748b;margin-top:2px;">${escape(studentName)}</div>
            </div>
            <button onclick="document.getElementById('student-note-overlay').style.display='none'" style="background:none;border:none;font-size:1.5rem;color:#94a3b8;cursor:pointer;">×</button>
          </div>
          <div style="padding:1.25rem 1.5rem;">
            <label class="label">Status in this batch</label>
            <select class="select" id="sn-status" style="margin-bottom:1rem;">
              <option value="Active" ${existingStatus==='Active'?'selected':''}>✅ Active</option>
              <option value="Dropped" ${existingStatus==='Dropped'?'selected':''}>🚫 Dropped out</option>
              <option value="Moved" ${existingStatus==='Moved'?'selected':''}>🔀 Moved to another batch</option>
            </select>
            <label class="label">Comment (e.g. "Moved to Batch 2 from June", fee note, behaviour...)</label>
            <textarea class="input" id="sn-note" rows="4" style="resize:vertical;">${escape(existingNote)}</textarea>
          </div>
          <div style="padding:1rem 1.5rem;border-top:1px solid #e2e8f0;display:flex;gap:0.5rem;justify-content:flex-end;">
            <button class="btn btn-ghost" onclick="document.getElementById('student-note-overlay').style.display='none'">Cancel</button>
            <button class="btn btn-primary" id="sn-save" onclick="saveStudentNote('${studentId}')">Save</button>
          </div>
        </div>
      `;
      modal.style.display = 'flex';
    }
    
    async function saveStudentNote(studentId) {
      const btn = document.getElementById('sn-save');
      btn.disabled = true; btn.textContent = 'Saving...';
      const r = await apiCall('updateBatchStudent', {
        GroupClassID: currentClass.GroupClassID,
        StudentID: studentId,
        Remarks: document.getElementById('sn-note').value.trim(),
        Status: document.getElementById('sn-status').value
      });
      btn.disabled = false; btn.textContent = 'Save';
      if (r && r.success) {
        showToast('Note saved', 'success');
        document.getElementById('student-note-overlay').style.display = 'none';
        loadClassBook();
      } else {
        showToast(r?.error || 'Failed', 'error');
      }
    }
    
    // Init
    loadClasses();
  </script>
</body>
</html>
