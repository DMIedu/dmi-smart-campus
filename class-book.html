<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Book — DMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .container {
      max-width: 100%;
      padding: 1.5rem;
    }
    
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: var(--dmi-primary); }
    
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .page-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    
    .page-subtitle {
      color: var(--text-muted);
      font-size: 0.9375rem;
    }
    
    /* Class selector */
    .selector-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    
    .selector-row {
      display: flex;
      gap: 1rem;
      align-items: end;
      flex-wrap: wrap;
    }
    
    .selector-field {
      flex: 1;
      min-width: 240px;
    }
    
    /* Class info header */
    .class-info-card {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e2a5e 100%);
      color: white;
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    
    .class-info-card::after {
      content: '';
      position: absolute;
      right: -50px;
      top: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    
    .class-info-batch {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      position: relative;
      z-index: 1;
    }
    
    .class-info-course {
      opacity: 0.85;
      font-size: 0.9375rem;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }
    
    .class-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.15);
      position: relative;
      z-index: 1;
    }
    
    .info-stat-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
      margin-bottom: 0.25rem;
    }
    
    .info-stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
    }
    
    .progress-bar {
      margin-top: 0.5rem;
      background: rgba(255,255,255,0.15);
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
    }
    
    .progress-fill {
      background: #fbbf24;
      height: 100%;
      transition: width 600ms ease-out;
    }
    
    /* Action bar */
    .action-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    /* Attendance table */
    .book-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    
    .book-scroll {
      overflow-x: auto;
      max-height: 70vh;
      overflow-y: auto;
    }
    
    .book-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
      min-width: 800px;
    }
    
    .book-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
    }
    
    .book-table th {
      padding: 0.75rem 0.5rem;
      text-align: center;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: var(--surface);
    }
    
    .book-table th.fixed-col {
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 11;
      text-align: left;
      box-shadow: 2px 0 5px rgba(0,0,0,0.04);
    }
    
    .book-table th.fixed-col.col-name { left: 70px; min-width: 180px; }
    .book-table th.fixed-col.col-reg { width: 70px; }
    .book-table th.fixed-col.col-phone { left: 250px; }
    
    .book-table td {
      padding: 0.625rem 0.5rem;
      border-bottom: 1px solid #f1f5f9;
      text-align: center;
      white-space: nowrap;
    }
    
    .book-table td.fixed-col {
      position: sticky;
      background: var(--surface);
      text-align: left;
      z-index: 5;
      box-shadow: 2px 0 5px rgba(0,0,0,0.04);
    }
    
    .book-table td.col-reg { left: 0; width: 70px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
    .book-table td.col-name { left: 70px; min-width: 180px; font-weight: 600; }
    .book-table td.col-phone { left: 250px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
    
    .book-table tbody tr:hover td { background: #f8fafc; }
    
    /* Attendance cells */
    .att-cell {
      width: 40px;
      height: 36px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 150ms;
      user-select: none;
    }
    
    .att-present { background: #d1fae5; color: #065f46; }
    .att-present:hover { background: #a7f3d0; }
    
    .att-absent { background: #fee2e2; color: #991b1b; }
    .att-absent:hover { background: #fecaca; }
    
    .att-none { background: #f1f5f9; color: #cbd5e1; }
    .att-none:hover { background: #e2e8f0; }
    
    /* Date column header */
    .date-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .date-day { font-size: 0.625rem; opacity: 0.7; }
    .date-num { font-size: 0.875rem; font-weight: 800; color: var(--text); }
    
    /* Total columns */
    .total-cell {
      font-weight: 700;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
    }
    
    .percent-badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .percent-good { background: #d1fae5; color: #065f46; }
    .percent-warn { background: #fef3c7; color: #92400e; }
    .percent-bad { background: #fee2e2; color: #991b1b; }
    
    /* Fee status */
    .fee-badge {
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .fee-paid { background: #d1fae5; color: #065f46; }
    .fee-pending { background: #fef3c7; color: #92400e; }
    .fee-overdue { background: #fee2e2; color: #991b1b; }
    
    /* Empty states */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .empty-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .empty-text {
      font-size: 0.9375rem;
      max-width: 360px;
      margin: 0 auto 1.5rem;
      line-height: 1.5;
    }
    
    /* Add Students Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    
    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 60px -15px rgba(0,0,0,0.3);
      animation: pop-in 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes pop-in {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .modal-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }
    
    .modal-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .modal-search {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1.5rem;
    }
    
    .student-pick-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.625rem 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 150ms;
    }
    .student-pick-row:hover { background: var(--bg); }
    
    .pick-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms;
      flex-shrink: 0;
    }
    
    .student-pick-row.checked .pick-checkbox {
      background: var(--dmi-primary);
      border-color: var(--dmi-primary);
      color: white;
    }
    .student-pick-row.checked .pick-checkbox::after {
      content: '✓';
      font-size: 0.875rem;
      font-weight: 700;
    }
    
    .student-pick-row.already-in {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pick-info { flex: 1; min-width: 0; }
    .pick-name { font-weight: 600; font-size: 0.9375rem; }
    .pick-meta { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-mono); }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }
    
    .selection-count {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .class-info-card { padding: 1.25rem; }
      .class-info-batch { font-size: 1.25rem; }
    }
    
    @media print {
      .dmi-header, .back-link, .action-bar, .selector-card { display: none !important; }
      .container { padding: 0; }
      .class-info-card { 
        background: white !important; 
        color: black !important; 
        border: 1px solid #ccc;
      }
      .class-info-card::after { display: none; }
      .book-scroll { max-height: none; overflow: visible; }
      .book-table { font-size: 0.75rem; }
      .att-cell { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <header class="dmi-header">
    <div class="dmi-logo">
      <div class="dmi-logo-mark">D</div>
      <span>DMI Smart Campus</span>
    </div>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </header>
  
  <div class="container">
    <a href="reception-dashboard.html" class="back-link">← Back to dashboard</a>
    
    <div class="page-header fade-in">
      <div>
        <h1 class="page-title">Digital Class Book</h1>
        <p class="page-subtitle">View and manage attendance for any class.</p>
      </div>
    </div>
    
    <!-- Class Selector -->
    <div class="selector-card fade-in">
      <div class="selector-row">
        <div class="selector-field">
          <label class="label">Select Class</label>
          <select class="select" id="class-select" onchange="loadClassBook()">
            <option value="">Loading classes...</option>
          </select>
        </div>
        <button class="btn btn-ghost" onclick="loadClasses()" title="Refresh">
          🔄 Refresh
        </button>
      </div>
    </div>
    
    <!-- Main content area -->
    <div id="main-content"></div>
  </div>
  
  <!-- Add Students Modal -->
  <div class="modal-overlay" id="add-students-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Add Students to Batch</div>
        <div class="modal-subtitle" id="modal-batch-name">—</div>
      </div>
      
      <div class="modal-search">
        <input type="text" class="input" id="student-search" placeholder="🔍 Search by name or registration number..." oninput="filterStudents()">
      </div>
      
      <div class="modal-body" id="students-pick-list">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>Loading students...</div>
        </div>
      </div>
      
      <div class="modal-footer">
        <div class="selection-count" id="selection-count">0 selected</div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-ghost" onclick="closeAddStudents()">Cancel</button>
          <button class="btn btn-primary" id="add-selected-btn" onclick="addSelectedStudents()">Add Selected</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Mark Attendance Modal -->
  <div class="modal-overlay" id="mark-modal">
    <div class="modal-card" style="max-width: 420px;">
      <div class="modal-header">
        <div class="modal-title" id="mark-student-name">Mark Attendance</div>
        <div class="modal-subtitle" id="mark-date">—</div>
      </div>
      
      <div style="padding: 1.5rem;">
        <div style="display: flex; gap: 0.75rem;">
          <button class="btn btn-primary" style="flex:1;background:#059669" onclick="setAttendance('Present')">
            ✓ Present
          </button>
          <button class="btn btn-primary" style="flex:1;background:#dc2626" onclick="setAttendance('Absent')">
            ✕ Absent
          </button>
        </div>
        <button class="btn btn-ghost" style="width:100%;margin-top:0.75rem" onclick="closeMarkModal()">Cancel</button>
      </div>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(['admin', 'reception', 'teacher']);
    if (!user) throw 'redirect';
    
    let currentClass = null;
    let currentBook = null;
    let allStudents = [];
    let batchStudentIds = new Set();
    let selectedToAdd = new Set();
    let pendingMark = null;
    
    // Load list of classes for dropdown
    async function loadClasses() {
      const result = await apiCall('listGroupClasses', { status: 'Active' });
      const select = document.getElementById('class-select');
      
      if (!result || !result.success) {
        select.innerHTML = '<option value="">Failed to load classes</option>';
        return;
      }
      
      if (result.classes.length === 0) {
        select.innerHTML = '<option value="">No classes yet — create one first</option>';
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state card">
            <div class="empty-icon">📚</div>
            <div class="empty-title">No classes yet</div>
            <div class="empty-text">Create a group class first to start building your attendance book.</div>
            <a href="group-class-create.html" class="btn btn-primary">+ Create Class</a>
          </div>
        `;
        return;
      }
      
      let options = '<option value="">Select a class...</option>';
      result.classes.forEach(c => {
        options += `<option value="${c.GroupClassID}">${c.BatchName} — ${c.Course} (${c.TeacherName})</option>`;
      });
      select.innerHTML = options;
      
      // Auto-select if there's a class ID in URL
      const urlParams = new URLSearchParams(window.location.search);
      const classId = urlParams.get('class');
      if (classId) {
        select.value = classId;
        loadClassBook();
      }
    }
    
    // Load the class book matrix
    async function loadClassBook() {
      const selectEl = document.getElementById('class-select');
      // Read value from the selected option directly (most reliable)
      const classId = selectEl.options[selectEl.selectedIndex] 
        ? selectEl.options[selectEl.selectedIndex].value 
        : selectEl.value;
      const mainContent = document.getElementById('main-content');
      
      if (!classId || classId.trim() === '') {
        mainContent.innerHTML = '';
        return;
      }
      
      mainContent.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><div>Loading class book...</div></div>';
      
      const result = await apiCall('getClassBook', { GroupClassID: classId.trim() });
      
      if (!result || !result.success) {
        mainContent.innerHTML = `
          <div class="empty-state card">
            <div class="empty-icon">⚠</div>
            <div class="empty-title">Could not load class book</div>
            <div class="empty-text">${result?.error || 'Unknown error'}</div>
          </div>
        `;
        return;
      }
      
      currentClass = result.classInfo;
      currentBook = result;
      batchStudentIds = new Set(result.students.map(s => s.StudentID));
      
      renderClassBook();
    }
    
    function renderClassBook() {
      const info = currentClass;
      const summary = currentBook.summary;
      const students = currentBook.students;
      const dates = currentBook.classDates;
      
      let html = `
        <!-- Class info header -->
        <div class="class-info-card fade-in">
          <div class="class-info-batch">${escape(info.BatchName)}</div>
          <div class="class-info-course">${escape(info.Course)} · ${escape(info.BranchName)} · ${escape(info.TeacherName)}</div>
          <div class="class-info-grid">
            <div>
              <div class="info-stat-label">Days</div>
              <div class="info-stat-value">${escape(info.Days || '—').replace(/,/g, ' · ')}</div>
            </div>
            <div>
              <div class="info-stat-label">Time</div>
              <div class="info-stat-value">${escape(info.Time)}</div>
            </div>
            <div>
              <div class="info-stat-label">Students</div>
              <div class="info-stat-value">${students.length}</div>
            </div>
            <div>
              <div class="info-stat-label">Classes Conducted</div>
              <div class="info-stat-value">${summary.ClassesConducted} / ${info.ExpectedClasses}</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${summary.ProgressPercent}%"></div></div>
            </div>
            <div>
              <div class="info-stat-label">Hours Done</div>
              <div class="info-stat-value">${summary.HoursCompleted} / ${info.TotalCourseHours}h</div>
            </div>
            <div>
              <div class="info-stat-label">Units</div>
              <div class="info-stat-value">${summary.UnitsCompleted} / ${info.NumberOfUnits}</div>
            </div>
          </div>
        </div>
        
        <!-- Action bar -->
        <div class="action-bar">
          <button class="btn btn-primary" onclick="openAddStudents()">+ Add Students</button>
          <button class="btn btn-ghost" onclick="window.print()">🖨 Print</button>
          <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
          <button class="btn btn-ghost" onclick="loadClassBook()">🔄 Refresh</button>
        </div>
      `;
      
      if (students.length === 0) {
        html += `
          <div class="empty-state card">
            <div class="empty-icon">👥</div>
            <div class="empty-title">No students in this batch yet</div>
            <div class="empty-text">Add students from your database to start tracking attendance.</div>
            <button class="btn btn-primary" onclick="openAddStudents()">+ Add Students</button>
          </div>
        `;
      } else {
        html += `<div class="book-wrapper"><div class="book-scroll"><table class="book-table"><thead><tr>`;
        html += `<th class="fixed-col col-reg">Reg #</th>`;
        html += `<th class="fixed-col col-name">Student Name</th>`;
        html += `<th class="fixed-col col-phone">Phone</th>`;
        
        // Date columns
        dates.forEach(d => {
          const date = new Date(d);
          const day = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
          const num = date.getDate() + '/' + (date.getMonth()+1);
          html += `<th><div class="date-header"><span class="date-day">${day}</span><span class="date-num">${num}</span></div></th>`;
        });
        
        html += `<th>Present</th><th>Absent</th><th>%</th><th>Fee</th>`;
        html += `</tr></thead><tbody>`;
        
        students.forEach(s => {
          html += `<tr>`;
          html += `<td class="fixed-col col-reg">${escape(s.RegistrationNumber)}</td>`;
          html += `<td class="fixed-col col-name">${escape(s.StudentName)}</td>`;
          html += `<td class="fixed-col col-phone">${escape(s.PhoneNumber)}</td>`;
          
          dates.forEach(d => {
            const status = s.attendance[d];
            const cls = status === 'Present' ? 'att-present' : status === 'Absent' ? 'att-absent' : 'att-none';
            const symbol = status === 'Present' ? '✓' : status === 'Absent' ? '✕' : '·';
            html += `<td><div class="att-cell ${cls}" onclick="openMarkModal('${s.StudentID}','${escape(s.StudentName)}','${d}')">${symbol}</div></td>`;
          });
          
          const pct = s.AttendancePercent;
          const pctClass = pct >= 75 ? 'percent-good' : pct >= 50 ? 'percent-warn' : 'percent-bad';
          
          html += `<td class="total-cell" style="color:#065f46">${s.TotalPresent}</td>`;
          html += `<td class="total-cell" style="color:#991b1b">${s.TotalAbsent}</td>`;
          html += `<td><span class="percent-badge ${pctClass}">${pct}%</span></td>`;
          
          const feeClass = s.FeeStatus === 'Paid' ? 'fee-paid' : s.FeeStatus === 'Overdue' ? 'fee-overdue' : 'fee-pending';
          html += `<td><span class="fee-badge ${feeClass}">${escape(s.FeeStatus || 'Pending')}</span></td>`;
          
          html += `</tr>`;
        });
        
        html += `</tbody></table></div></div>`;
      }
      
      document.getElementById('main-content').innerHTML = html;
    }
    
    // === Add Students Modal ===
    async function openAddStudents() {
      document.getElementById('modal-batch-name').textContent = currentClass.BatchName;
      document.getElementById('add-students-modal').classList.add('active');
      document.getElementById('student-search').value = '';
      selectedToAdd.clear();
      updateSelectionCount();
      
      // Load students if not already
      const result = await apiCall('searchStudents', {});
      
      if (!result || !result.success) {
        document.getElementById('students-pick-list').innerHTML = 
          '<div class="empty-state">Failed to load students</div>';
        return;
      }
      
      allStudents = result.students;
      renderStudentPickList();
    }
    
    function renderStudentPickList() {
      const search = document.getElementById('student-search').value.toLowerCase().trim();
      
      let filtered = allStudents;
      if (search) {
        filtered = filtered.filter(s => 
          String(s.StudentName).toLowerCase().includes(search) ||
          String(s.RegistrationNumber).toLowerCase().includes(search) ||
          String(s.PhoneNumber).includes(search)
        );
      }
      
      if (filtered.length === 0) {
        document.getElementById('students-pick-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div>No students found.</div>
            ${!search ? '<div style="margin-top:1rem"><a href="student-register.html" class="btn btn-primary">+ Register Student</a></div>' : ''}
          </div>
        `;
        return;
      }
      
      let html = '';
      filtered.forEach(s => {
        const alreadyIn = batchStudentIds.has(s.StudentID);
        const isChecked = selectedToAdd.has(s.StudentID);
        const rowClass = alreadyIn ? 'already-in' : (isChecked ? 'checked' : '');
        const clickHandler = alreadyIn ? '' : `onclick="toggleStudent('${s.StudentID}')"`;
        
        html += `
          <div class="student-pick-row ${rowClass}" ${clickHandler}>
            <div class="pick-checkbox"></div>
            <div class="pick-info">
              <div class="pick-name">${escape(s.StudentName)}</div>
              <div class="pick-meta">${escape(s.RegistrationNumber)} · ${escape(s.Course || '')} · ${escape(s.PhoneNumber || '')}</div>
            </div>
            ${alreadyIn ? '<span class="badge badge-info">Already in</span>' : ''}
          </div>
        `;
      });
      
      document.getElementById('students-pick-list').innerHTML = html;
    }
    
    function toggleStudent(sid) {
      if (selectedToAdd.has(sid)) selectedToAdd.delete(sid);
      else selectedToAdd.add(sid);
      renderStudentPickList();
      updateSelectionCount();
    }
    
    function filterStudents() {
      renderStudentPickList();
    }
    
    function updateSelectionCount() {
      const n = selectedToAdd.size;
      document.getElementById('selection-count').textContent = `${n} selected`;
      document.getElementById('add-selected-btn').disabled = n === 0;
    }
    
    async function addSelectedStudents() {
      if (selectedToAdd.size === 0) return;
      
      const btn = document.getElementById('add-selected-btn');
      btn.disabled = true;
      btn.textContent = 'Adding...';
      
      const result = await apiCall('addStudentsToBatch', {
        GroupClassID: currentClass.GroupClassID,
        StudentIDs: Array.from(selectedToAdd)
      });
      
      btn.disabled = false;
      btn.textContent = 'Add Selected';
      
      if (result && result.success) {
        showToast(result.message, 'success');
        closeAddStudents();
        loadClassBook();
      } else {
        showToast(result?.error || 'Failed to add students', 'error');
      }
    }
    
    function closeAddStudents() {
      document.getElementById('add-students-modal').classList.remove('active');
    }
    
    // === Mark Attendance Modal ===
    function openMarkModal(studentId, studentName, date) {
      pendingMark = { studentId, studentName, date };
      document.getElementById('mark-student-name').textContent = studentName;
      document.getElementById('mark-date').textContent = new Date(date).toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'short', year: 'numeric'
      });
      document.getElementById('mark-modal').classList.add('active');
    }
    
    function closeMarkModal() {
      document.getElementById('mark-modal').classList.remove('active');
      pendingMark = null;
    }
    
    async function setAttendance(status) {
      if (!pendingMark) return;
      
      const result = await apiCall('markManualAttendance', {
        StudentID: pendingMark.studentId,
        GroupClassID: currentClass.GroupClassID,
        Date: pendingMark.date,
        Status: status
      });
      
      if (result && result.success) {
        showToast(`Marked ${pendingMark.studentName} as ${status}`, 'success');
        closeMarkModal();
        loadClassBook();
      } else {
        showToast(result?.error || 'Failed to mark', 'error');
      }
    }
    
    // === Export CSV ===
    function exportCSV() {
      const info = currentClass;
      const students = currentBook.students;
      const dates = currentBook.classDates;
      
      let csv = `Class: ${info.BatchName}\nCourse: ${info.Course}\nTeacher: ${info.TeacherName}\nBranch: ${info.BranchName}\n\n`;
      csv += 'Reg #,Student Name,Phone,';
      dates.forEach(d => csv += `"${d}",`);
      csv += 'Present,Absent,%,Fee Status\n';
      
      students.forEach(s => {
        csv += `"${s.RegistrationNumber}","${s.StudentName}","${s.PhoneNumber}",`;
        dates.forEach(d => {
          const v = s.attendance[d];
          csv += `${v === 'Present' ? 'P' : v === 'Absent' ? 'A' : '-'},`;
        });
        csv += `${s.TotalPresent},${s.TotalAbsent},${s.AttendancePercent}%,"${s.FeeStatus}"\n`;
      });
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ClassBook_${info.BatchName.replace(/\s+/g, '_')}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('CSV downloaded', 'success');
    }
    
    function escape(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    
    // Init
    loadClasses();
  </script>
</body>
</html>
